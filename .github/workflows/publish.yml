name: Publish to npm

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Build & Publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Verify dist matches package version
        run: |
          pkg_version=$(node -p "require('./package.json').version")
          release_tag="${GITHUB_REF##*/}"
          release_version="${release_tag#v}"
          echo "package.json version: $pkg_version"
          echo "release tag version:  $release_version"
          if [ "$pkg_version" != "$release_version" ]; then
            echo "::error::package.json version ($pkg_version) does not match release tag ($release_version)"
            exit 1
          fi

      - name: Setup Node for npm publish
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          registry-url: https://registry.npmjs.org

      - name: Publish
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
